services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: aerogo-api
    restart: unless-stopped
    environment:
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      EMAIL_VERIFICATION_SECRET: ${EMAIL_VERIFICATION_SECRET:-change-me-email-verification-secret}
      EMAIL_TOKEN_MAX_AGE_SECONDS: ${EMAIL_TOKEN_MAX_AGE_SECONDS:-86400}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-aerogo}
      MYSQL_USER: ${MYSQL_USER:-aerogo_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me_app_password}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-AeroGo <noreply@aerogo.local>}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: aerogo-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-aerogo}
      MYSQL_USER: ${MYSQL_USER:-aerogo_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me_app_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me_root_password}
      TZ: Asia/Seoul
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - aerogo_mysql_data:/var/lib/mysql
      - ./database/mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  aerogo_mysql_data:
