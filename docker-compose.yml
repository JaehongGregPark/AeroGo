services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: aerogo-api
    restart: unless-stopped
    environment:
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      EMAIL_VERIFICATION_SECRET: ${EMAIL_VERIFICATION_SECRET:-change-me-email-verification-secret}
      EMAIL_TOKEN_MAX_AGE_SECONDS: ${EMAIL_TOKEN_MAX_AGE_SECONDS:-86400}
      SESSION_MAX_AGE_SECONDS: ${SESSION_MAX_AGE_SECONDS:-2592000}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-aerogo}
      POSTGRES_USER: ${POSTGRES_USER:-aerogo_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_app_password}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-AeroGo <noreply@aerogo.local>}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  # 이전엔 MySQL 8.4였으나, 통합 테스트 서버에서 aura/EIPQuiz와 DB 엔진을 하나로
  # 맞추기 위해 Postgres로 전환. 스키마(database/postgres/*.sql)는 이제 postgres
  # 컨테이너의 initdb.d가 아니라 backend/Dockerfile의 CMD가 api 컨테이너 기동 시마다
  # psql로 직접 적용합니다(전부 IF NOT EXISTS/ON CONFLICT라 재실행 안전) - 이렇게 하면
  # 이 postgres 컨테이너를 나중에 공유 인스턴스로 바꿔도(통합 서버) 그대로 동작합니다.
  postgres:
    image: postgres:16-alpine
    container_name: aerogo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-aerogo}
      POSTGRES_USER: ${POSTGRES_USER:-aerogo_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_app_password}
      TZ: Asia/Seoul
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - aerogo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aerogo_app} -d ${POSTGRES_DATABASE:-aerogo}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  aerogo_postgres_data:
